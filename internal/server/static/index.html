<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/cpp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/dockerfile.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/dist/languages/ini.min.js"></script>
  <script>hljs.addPlugin({"after:highlightBlock": ({resultEl}) => {
    resultEl.querySelectorAll('table').forEach(t => t.classList.remove('hljs-ln'));
  }});</script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ctp: {
              base: '#1e1e2e', mantle: '#181825', crust: '#11111b',
              surface0: '#313244', surface1: '#45475a', surface2: '#585b70',
              overlay0: '#6c7086', overlay1: '#7f849c',
              subtext0: '#a6adc8', text: '#cdd6f4',
              lavender: '#b4befe', blue: '#89b4fa', sky: '#89dceb',
              teal: '#94e2d5', green: '#a6e3a1', yellow: '#f9e2af',
              peach: '#fab387', maroon: '#eba0ac', red: '#f38ba8',
              mauve: '#cba6f7', pink: '#f5c2e7', flamingo: '#f2cdcd', rosewater: '#f5e0dc',
            }
          },
          fontFamily: {
            sans: ['"JetBrains Mono"', 'monospace'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0', transform: 'translateY(-4px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            pulse: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.5' } },
          },
          animation: {
            fadeIn: 'fadeIn 0.2s ease',
            pulse: 'pulse 1.5s ease-in-out infinite',
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #313244; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #45475a; }
    .prose-markdown { font-size: 13px; line-height: 1.7; color: #cdd6f4; }
    .prose-markdown p { margin: 0 0 0.6em 0; }
    .prose-markdown p:last-child { margin-bottom: 0; }
    .prose-markdown strong { color: #f5e0dc; font-weight: 600; }
    .prose-markdown em { color: #f2cdcd; font-style: italic; }
    .prose-markdown a { color: #89b4fa; text-decoration: underline; text-underline-offset: 2px; }
    .prose-markdown h1, .prose-markdown h2, .prose-markdown h3, .prose-markdown h4 { margin: 1em 0 0.4em; font-weight: 700; color: #cba6f7; }
    .prose-markdown h1 { font-size: 1.4em; border-bottom: 1px solid #313244; padding-bottom: 0.3em; }
    .prose-markdown h2 { font-size: 1.2em; border-bottom: 1px solid #313244; padding-bottom: 0.25em; }
    .prose-markdown h3 { font-size: 1.05em; }
    .prose-markdown code { font-size: 0.88em; padding: 0.15em 0.4em; border-radius: 4px; background: #181825; color: #fab387; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .prose-markdown pre { margin: 0.6em 0; padding: 0.75em 1em; border-radius: 8px; background: #11111b; border: 1px solid #313244; overflow-x: auto; }
    .prose-markdown pre code { padding: 0; background: transparent; color: #cdd6f4; font-size: 0.85em; line-height: 1.6; }
    .prose-markdown blockquote { margin: 0.6em 0; padding: 0.4em 1em; border-left: 3px solid #cba6f7; background: color-mix(in srgb, #cba6f7 8%, #1e1e2e); border-radius: 0 6px 6px 0; color: #a6adc8; }
    .prose-markdown ul { margin: 0.4em 0; padding-left: 1.4em; list-style: disc; }
    .prose-markdown ol { margin: 0.4em 0; padding-left: 1.4em; list-style: decimal; }
    .prose-markdown li { margin: 0.15em 0; padding-left: 0.2em; }
    .prose-markdown li::marker { color: #7f849c; }
    .prose-markdown table { margin: 0.6em 0; width: 100%; border-collapse: collapse; font-size: 0.92em; }
    .prose-markdown th { text-align: left; padding: 0.4em 0.7em; background: #181825; color: #cba6f7; font-weight: 600; border: 1px solid #313244; }
    .prose-markdown td { padding: 0.4em 0.7em; border: 1px solid #313244; }
    .prose-markdown tr:nth-child(even) td { background: color-mix(in srgb, #313244 30%, #1e1e2e); }
    .hljs { background: transparent !important; padding: 0 !important; }
    pre .hljs { background: #11111b !important; padding: 0.75em 1em !important; border-radius: 6px; border: 1px solid #313244; }
    .typing-dots span { animation: pulse 1.4s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; top: 0; left: -280px; height: 100vh; z-index: 50; transition: left 0.3s ease; }
      .sidebar.open { left: 0; }
      .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
      .sidebar-overlay.open { display: block; }
      .main-content { width: 100% !important; }
    }
  </style>
</head>
<body class="m-0 p-0 bg-ctp-base text-ctp-text">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="sidebar w-[280px] bg-ctp-mantle border-r border-ctp-surface0 flex flex-col">
      <div class="p-4 border-b border-ctp-surface0 text-sm font-semibold text-ctp-blue flex items-center justify-between">
        <span>⚡ Sessions</span>
        <div class="flex items-center gap-2">
          <button class="text-ctp-green hover:text-ctp-teal text-xs font-bold" onclick="showNewSessionModal()" title="New Session">＋</button>
          <button class="md:hidden text-ctp-overlay0 hover:text-ctp-text" onclick="toggleSidebar()">✕</button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto" id="sessionList" hx-get="/sessions" hx-trigger="load" hx-swap="innerHTML">
        <div class="flex items-center justify-center h-full text-ctp-overlay0 text-sm">Loading...</div>
      </div>
    </div>

    <!-- Main -->
    <div class="main-content flex-1 flex flex-col">
      <!-- Mobile hamburger -->
      <button class="md:hidden absolute top-2.5 left-2.5 z-30 p-1.5 rounded-md bg-ctp-surface0 text-ctp-text hover:bg-ctp-surface1" onclick="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <!-- Header -->
      <div class="px-5 py-2.5 border-b border-ctp-surface0 flex items-center gap-3 bg-ctp-mantle flex-wrap">
        <div class="w-2 h-2 rounded-full transition-colors duration-300" id="wsDot" style="background:#f38ba8"></div>
        <span class="text-sm text-ctp-overlay0 shrink-0" id="wsStatus">Disconnected</span>
        <div class="flex-1 min-w-0 overflow-hidden flex items-center gap-2" id="headerInfo"></div>
        <span id="modelBadge" class="hidden text-[11px] px-2 py-0.5 rounded-full whitespace-nowrap" style="background:color-mix(in srgb, #89b4fa 20%, transparent); color:#89b4fa"></span>
        <button id="quitSessionBtn" class="hidden px-3 py-1 rounded-md text-xs font-semibold bg-ctp-red/20 text-ctp-red hover:bg-ctp-red/30 transition-colors" onclick="quitSession()">
          Quit Session
        </button>
      </div>

      <!-- Chat Area -->
      <div class="flex-1 flex flex-col min-h-0">
        <!-- Messages -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" id="chatMessages">
          <div class="flex items-center justify-center h-full text-ctp-overlay0 text-sm" id="emptyState">
            Select a session and start RPC to begin chatting
          </div>
        </div>

        <!-- Input Area -->
        <div class="border-t border-ctp-surface0 bg-ctp-mantle p-3">
          <div class="flex gap-2 items-end">
            <textarea
              id="chatInput"
              class="flex-1 px-3 py-2 bg-ctp-crust border border-ctp-surface0 rounded-lg text-ctp-text text-sm font-mono resize-none focus:outline-none focus:border-ctp-blue placeholder:text-ctp-overlay0"
              rows="1"
              placeholder="Select a session and start RPC to chat..."
              disabled
              onkeydown="handleChatKey(event)"
              oninput="autoResize(this)"
            ></textarea>
            <button
              id="sendBtn"
              class="px-4 py-2 rounded-lg text-sm font-semibold bg-ctp-blue text-ctp-crust hover:bg-ctp-blue/80 transition-colors disabled:opacity-40 disabled:cursor-not-allowed shrink-0"
              disabled
              onclick="sendMessage()"
            >
              Send
            </button>
          </div>
          <div class="text-[10px] text-ctp-overlay0 mt-1.5 flex items-center gap-3 justify-between">
            <div class="flex items-center gap-3">
              <span>Enter to send · Shift+Enter for new line</span>
              <span id="inputHint" class="hidden">Streaming... messages will be queued</span>
            </div>
            <div class="flex items-center gap-3">
              <div class="flex items-center gap-1.5">
                <div class="w-2 h-2 rounded-full transition-colors duration-300" id="rpcDot" style="background:#6c7086"></div>
                <span id="rpcStatus">RPC: idle</span>
              </div>
              <button id="rpcToggleBtn" class="px-3 py-1 rounded-md text-xs font-semibold bg-ctp-surface0 text-ctp-overlay0 hover:bg-ctp-surface1 transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled onclick="toggleRPC()">
                Start RPC
              </button>
              <button id="abortBtn" class="px-3 py-1 rounded-md text-xs font-semibold bg-ctp-red/20 text-ctp-red hover:bg-ctp-red/30 transition-colors hidden" onclick="abortRPC()">
                ⏹ Abort
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- New Session Modal -->
  <div id="newSessionModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideNewSessionModal()"></div>
    <div class="relative bg-ctp-mantle border border-ctp-surface0 rounded-2xl shadow-2xl w-[440px] max-w-[90vw] animate-fadeIn overflow-hidden">
      <!-- Modal Header -->
      <div class="px-6 pt-5 pb-4 border-b border-ctp-surface0">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-ctp-blue/20 flex items-center justify-center">
              <span class="text-sm">⚡</span>
            </div>
            <div>
              <h3 class="text-sm font-semibold text-ctp-text">New Session</h3>
              <p class="text-[11px] text-ctp-overlay0 mt-0.5">Create a new agent session</p>
            </div>
          </div>
          <button class="text-ctp-overlay0 hover:text-ctp-text transition-colors p-1 rounded-md hover:bg-ctp-surface0" onclick="hideNewSessionModal()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Modal Body -->
      <div class="px-6 py-5">
        <label class="text-xs font-medium text-ctp-text block mb-2">Working Directory</label>
        <input id="newSessionCwd" type="text"
          class="w-full px-3.5 py-2.5 bg-ctp-crust border border-ctp-surface0 rounded-lg text-ctp-text text-sm font-mono focus:outline-none focus:border-ctp-blue focus:ring-2 focus:ring-ctp-blue/20 placeholder:text-ctp-overlay0 transition-all"
          onkeydown="if(event.key==='Enter') createNewSession()">
        <p class="text-[11px] text-ctp-overlay0 mt-2">Enter the project directory path to start a new agent session.</p>
      </div>

      <!-- Modal Footer -->
      <div class="px-6 py-4 border-t border-ctp-surface0 flex justify-end gap-2">
        <button class="px-4 py-2 rounded-lg text-xs font-medium text-ctp-overlay0 bg-ctp-surface0 hover:bg-ctp-surface1 hover:text-ctp-text transition-all" onclick="hideNewSessionModal()">Cancel</button>
        <button id="createSessionBtn" class="px-4 py-2 rounded-lg text-xs font-semibold bg-ctp-blue text-ctp-crust hover:bg-ctp-blue/80 transition-all shadow-lg shadow-ctp-blue/20" onclick="createNewSession()">Create & Start</button>
      </div>

      <!-- Error Message -->
      <div id="newSessionError" class="hidden px-6 pb-4">
        <div class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-ctp-red" style="background:color-mix(in srgb, #f38ba8 10%, #1e1e2e)">
          <span>⚠️</span>
          <span id="newSessionErrorText"></span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
